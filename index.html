<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinnacle Realty</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Pinnacle Realty</div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="#">Home</a>
    <a href="#">Properties</a>
    <a href="#">Contact</a>

    <span id="userInfo"></span>
    <button id="logoutBtn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- AUTH -->
<div class="auth-box">
  <h3>Login / Register</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="authStatus"></p>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="locationInput" placeholder="Location">
  <select id="typeFilter">
    <option value="">Type</option>
    <option>House</option>
    <option>Apartment</option>
  </select>
  <input type="number" id="bedFilter" placeholder="Beds">
</div>

<!-- PROPERTIES -->
<div class="section">
  <h2>Properties</h2>
  <div id="propertyList" class="properties"></div>
</div>

<!-- SAVED -->
<div class="section">
  <h2>Saved Properties</h2>
  <div id="savedList" class="properties"></div>
</div>

<!-- ADMIN -->
<div class="section">
  <h2>Admin Panel</h2>

  <input id="pTitle" placeholder="Title">
  <input id="pPrice" type="number" placeholder="Price">
  <input id="pLocation" placeholder="Location">
  <input id="pType" placeholder="Type">
  <input id="pBeds" type="number" placeholder="Bedrooms">
  <input type="file" id="pImageFile">

  <button onclick="addProperty()">Add Property</button>
  <p id="adminStatus"></p>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script src="app.js"></script>

</body>
</html>
